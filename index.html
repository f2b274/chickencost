<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Cost Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 6px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .alert-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .alert-box.leak {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .alert-box.profit {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .alert-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .alert-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Chicken Cost Calculator</h1>
    
    <div class="form-group">
        <label for="birdCount">Flock Size (Total Birds)</label>
        <input type="number" id="birdCount" value="12" oninput="calculateCosts()">
    </div>

    <div class="form-group">
        <label for="feedPrice">Feed Price (Per Pound)</label>
        <input type="number" id="feedPrice" value="0.85" step="0.01" oninput="calculateCosts()">
    </div>

    <div class="form-group">
        <label for="monthlyEggs">Eggs Gathered (Monthly Total)</label>
        <input type="number" id="monthlyEggs" value="240" oninput="calculateCosts()">
    </div>

    <div class="form-group">
        <label for="marketValue">Market Price (Per Dozen Eggs)</label>
        <input type="number" id="marketValue" value="4.50" step="0.25" oninput="calculateCosts()">
    </div>

    <div class="form-group">
        <label for="miscCosts">Coop Upkeep & Misc Fees (Monthly)</label>
        <input type="number" id="miscCosts" value="15.00" step="0.50" oninput="calculateCosts()">
    </div>

    <div class="results">
        <div class="result-item">
            <span>Total Monthly Upkeep:</span>
            <strong id="monthlyTotal">$0.00</strong>
        </div>
        <div class="result-item">
            <span>Cost Per Egg:</span>
            <strong id="eggCost">$0.00</strong>
        </div>
    </div>

    <div id="leakBox" class="alert-box leak">
        <div>⚠️ You are leaking money! Your maintenance outpaces egg value.</div>
        <a href="#pricing" class="alert-btn">Fix My Margins</a>
    </div>

    <div id="profitBox" class="alert-box profit">
        <div>📈 Your flock is profitable! Want to increase your profits further?</div>
        <a href="#pricing" class="alert-btn">Try This Tool</a>
    </div>
</div>

<script>
    function calculateCosts() {
        const birdCount = Math.max(0, parseFloat(document.getElementById('birdCount').value) || 0);
        const feedPrice = Math.max(0, parseFloat(document.getElementById('feedPrice').value) || 0);
        const monthlyEggs = Math.max(0, parseFloat(document.getElementById('monthlyEggs').value) || 0);
        const marketValue = Math.max(0, parseFloat(document.getElementById('marketValue').value) || 0);
        const miscCosts = Math.max(0, parseFloat(document.getElementById('miscCosts').value) || 0);
        
        // 4 lbs of feed per bird per month
        const feedTotalCost = birdCount * 4 * feedPrice;
        const totalUpkeep = feedTotalCost + miscCosts;
        
        let costPerEgg = 0;
        if (monthlyEggs > 0) {
            costPerEgg = totalUpkeep / monthlyEggs;
        }
        
        document.getElementById('monthlyTotal').textContent = '$' + totalUpkeep.toFixed(2);
        document.getElementById('eggCost').textContent = '$' + costPerEgg.toFixed(2);

        // Profit/Leak Alert Logic
        const eggValue = (monthlyEggs / 12) * marketValue;
        const leakBox = document.getElementById('leakBox');
        const profitBox = document.getElementById('profitBox');

        if (birdCount === 0 || monthlyEggs === 0) {
            leakBox.style.display = 'none';
            profitBox.style.display = 'none';
        } else if (totalUpkeep > eggValue) {
            leakBox.style.display = 'block';
            profitBox.style.display = 'none';
        } else {
            leakBox.style.display = 'none';
            profitBox.style.display = 'block';
        }
    }

    // Run on startup
    calculateCosts();
</script>

</body>
</html>
